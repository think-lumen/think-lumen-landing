<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Lumen — Coming Soon</title>
<meta name="description" content="Think Lumen — HOA Intelligence Platform. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0f0e0c;
  --paper: #f7f5f0;
  --muted: #7a7570;
  --accent: #c84b2f;
  --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  --mono: 'DM Mono', 'Fira Mono', monospace;
}
html, body {
  height: 100%;
}
body {
  font-family: var(--font);
  background: var(--ink);
  color: var(--paper);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.container {
  text-align: center;
  padding: 48px 32px;
  max-width: 480px;
}
.wordmark {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(247,245,240,0.35);
  margin-bottom: 40px;
}
.dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  margin: 0 10px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}
h1 {
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 20px;
  color: #f7f5f0;
}
h1 em {
  font-style: normal;
  color: var(--accent);
}
p {
  font-size: 15px;
  color: rgba(247,245,240,0.45);
  line-height: 1.7;
  max-width: 340px;
  margin: 0 auto;
}
.footer {
  margin-top: 56px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  color: rgba(247,245,240,0.18);
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="container">
  <div class="wordmark">Think Lumen <span class="dot"></span> Powered by Claude</div>
  <h1>Something<br><em>better</em> is coming.</h1>
  <p>We're putting the finishing touches on our new platform. Check back soon.</p>
  <div class="footer">think-lumen.com</div>
</div>
</body>
</html>
